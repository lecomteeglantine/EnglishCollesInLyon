name: Update jury reports

on:
  workflow_dispatch:
  schedule:
    - cron: "17 5 * * 3"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5
      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "24"
          package-manager-cache: false
      - name: Detect new official reports
        run: node scripts/update-jury-reports.mjs
      - name: Commit updated monitoring files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add jury-reports-detected.json jury-reports-status.json
          git diff --cached --quiet || git commit -m "Update jury reports monitoring"
          git push
