name: Update resource feed
on:
  workflow_dispatch:
  schedule:
    - cron: "17 5,17 * * *"
concurrency:
  group: update-resource-feed
  cancel-in-progress: false

permissions:
  contents: write
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install --omit=dev
      - run: node scripts/update-resources.mjs
      - name: Commit changed feed
        run: |
          if git diff --quiet -- resources-feed.json; then
            echo "No feed changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add resources-feed.json
          git commit -m "Auto-update resource feed"
          git push
