name: Check resource links
on:
  workflow_dispatch:
  schedule:
    - cron: "37 6 * * 1"
concurrency:
  group: check-resource-links
  cancel-in-progress: false

permissions:
  contents: write
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: node scripts/check-resource-links.mjs
      - name: Commit link status
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add resources-link-status.json
          if git diff --cached --quiet; then
            echo "No status changes."
            exit 0
          fi
          git commit -m "Weekly resource link check"
          git push
