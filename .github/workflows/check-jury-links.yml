name: Check jury report links

on:
  workflow_dispatch:
  schedule:
    - cron: "37 5 * * 1"

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5
      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "24"
          package-manager-cache: false
      - name: Check official links
        run: node scripts/check-jury-links.mjs
      - name: Commit link status
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add jury-links-status.json
          git diff --cached --quiet || git commit -m "Update jury report link status"
          git push
