name: Update daily country news

on:
  workflow_dispatch:
  schedule:
    - cron: "47 4 * * *"

permissions:
  contents: write

concurrency:
  group: update-daily-country-news
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install feed parser
        run: npm install --omit=dev

      - name: Refresh the eight country briefs
        run: node scripts/update-daily-news.mjs

      - name: Commit the refreshed brief
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add daily-news.json
          if git diff --cached --quiet; then
            echo "The daily brief is already up to date."
          else
            git commit -m "Refresh daily country news"
            git push
          fi
