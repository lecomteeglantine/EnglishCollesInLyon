name: Apply author credit - fixed

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  add-credit:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Add author credit
        run: python scripts/add-author-credit.py

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "Add Eglantine Lecomte credit across the site"
          git push
