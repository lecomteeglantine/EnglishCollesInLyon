<title>CPGE Vocabulary Workshop</title>
<style>
  :root{

  .opt.correct{border-color:var(--ok);background:#eef5ea}.opt.wrong{border-color:var(--acc);background:#f8ece9}
  .opt .tag{font-weight:700}.opt.correct .tag{color:var(--ok)}.opt.wrong .tag{color:var(--acc)}

  .wd{padding:16px 18px;margin-top:12px}.wd .w{color:var(--p2);font-weight:700;font-size:1.1rem}
  .wd .break{font-family:ui-monospace,Menlo,Consolas,monospace;background:var(--soft);border:1px solid var(--line);border-radius:8px;padding:8px 11px;margin-top:8px;font-size:.9rem;display:inline-block}
  .step{margin-top:14px}.step .sl{font-size:.72rem;letter-spacing:.12em;text-transform:uppercase;color:var(--acc);font-weight:700}
  .step h3{color:var(--p);font-size:1.05rem;margin:3px 0 8px}
  .pickrow{display:flex;flex-wrap:wrap;gap:9px}
  .pick{border:2px solid var(--line);background:var(--card);border-radius:11px;padding:11px 14px;font-size:.92rem;min-height:44px;text-align:left}
  .pick:hover{border-color:var(--p2);background:var(--soft)}.pick.on{border-color:var(--acc);background:#f8ece9}
  textarea{width:100%;border:2px solid var(--line);border-radius:11px;padding:12px;font:inherit;font-size:.95rem;min-height:80px;resize:vertical;background:var(--soft)}
  textarea:focus{outline:none;border-color:var(--p2);background:var(--card)}
  .plan{list-style:none;padding:0;margin:8px 0 0;counter-reset:n}.plan li{display:flex;gap:12px;padding:10px 0;border-bottom:1px solid var(--line);font-size:.95rem}.plan li:last-child{border:none}
  .plan li::before{counter-increment:n;content:counter(n,upper-roman);color:var(--acc);font-weight:700;min-width:26px}
  .sk{padding:18px;margin-top:14px}.sk h3{color:var(--p);font-size:1rem;border-bottom:2px solid var(--soft);padding-bottom:6px;margin-bottom:10px}
  .sk .words{display:flex;flex-wrap:wrap;gap:7px}.sk .words span{background:var(--soft);border:1px solid var(--line);border-radius:8px;padding:6px 10px;font-size:.85rem}
  .sk ul{margin:0;padding-left:20px}.sk li{padding:3px 0;font-size:.93rem}
  .lib-sec{margin-top:22px}.lib-sec h3{color:var(--p);border-left:7px solid var(--gold);padding-left:11px;font-size:1.2rem}
  .statusbar{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-top:22px;padding-top:16px;border-top:1px dashed var(--line)}
  .statusbar .lbl{font-size:.85rem;color:var(--muted);font-weight:600}
  .statusbar button{border:1px solid var(--line);border-radius:9px;padding:8px 12px;font-size:.82rem;font-weight:600;min-height:40px;background:var(--card)}
  .statusbar button.done{color:var(--ok)}.statusbar button.rev{color:var(--rev)}
  .cur{font-size:.82rem;font-weight:700}.cur.s-prog{color:var(--warn)}.cur.s-done{color:var(--ok)}.cur.s-rev{color:var(--rev)}.cur.s-none{color:var(--muted)}
  .note{margin-top:26px;background:var(--soft);border:1px dashed var(--line);border-radius:12px;padding:14px 16px;font-size:.82rem;color:var(--muted);line-height:1.6}
  @media (max-width:560px){.grid{grid-template-columns:1fr}}
  @media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>

<script>
const CHAPTER = {"id": "part1_chapter3_parties_ideologies", "number": 3, "part": "Part 1", "title": "Political Parties and Ideologies", "objective": "This premium chapter gives CPGE students the essential vocabulary needed to analyse political parties,\n        ideological labels, internal divisions, party discipline, polarisation and political strategy. Each entry includes the English term,\n        IPA phonetics, a practical pronunciation guide, an English definition, a French translation, and an exam-ready example sentence.", "tags": ["Political parties", "Ideologies", "Left and right", "Polarisation", "Party discipline", "Khôlles"], "categories": [{"id": "C1", "title": "A. Parties and party organisation"}, {"id": "C2", "title": "B. Ideologies and the political spectrum"}, {"id": "C3", "title": "C. Major political traditions"}, {"id": "C4", "title": "D. Political attitudes and divisions"}, {"id": "C5", "title": "E. Party discipline, factions and strategic verbs"}], "terms": [{"id": "t1", "cat": "C1", "term": "political party", "ipa": "/pəˈlɪtɪkəl ˈpɑːti/", "pron": "puh-LIT-i-kuhl PAR-tee", "fr": "parti politique", "def": "An organised group of people who share political ideas and try to win power through elections.", "ex": "Political parties compete to win elections and shape public policy.", "e": 1}, {"id": "t2", "cat": "C1", "term": "party system", "ipa": "/ˈpɑːti ˈsɪstəm/", "pron": "PAR-tee SIS-tuhm", "fr": "système partisan", "def": "The way political parties are organised and compete within a country.", "ex": "Britain’s party system has become more fragmented in recent years.", "e": 0}, {"id": "t3", "cat": "C1", "term": "two-party system", "ipa": "/ˌtuː ˈpɑːti ˈsɪstəm/", "pron": "too PAR-tee SIS-tuhm", "fr": "bipartisme ; système bipartisan", "def": "A political system dominated by two major parties.", "ex": "The United States is often described as a two-party system.", "e": 0}, {"id": "t4", "cat": "C1", "term": "multi-party system", "ipa": "/ˌmʌlti ˈpɑːti ˈsɪstəm/", "pron": "MUL-tee PAR-tee SIS-tuhm", "fr": "multipartisme", "def": "A political system in which several parties have a realistic chance of influencing government.", "ex": "A multi-party system can make coalition governments more likely.", "e": 0}, {"id": "t5", "cat": "C1", "term": "ruling party", "ipa": "/ˈruːlɪŋ ˈpɑːti/", "pron": "ROO-ling PAR-tee", "fr": "parti au pouvoir", "def": "The political party currently in power.", "ex": "The ruling party defended its economic record.", "e": 0}, {"id": "t6", "cat": "C1", "term": "opposition party", "ipa": "/ˌɒpəˈzɪʃən ˈpɑːti/", "pron": "op-uh-ZISH-uhn PAR-tee", "fr": "parti d’opposition", "def": "A political party that is not in government and criticises or challenges the ruling party.", "ex": "Opposition parties accused the government of ignoring the crisis.", "e": 0}, {"id": "t7", "cat": "C1", "term": "coalition", "ipa": "/ˌkəʊəˈlɪʃən/", "pron": "koh-uh-LISH-uhn", "fr": "coalition", "def": "An alliance between political parties or groups, often formed to govern together.", "ex": "The election result forced the parties to form a coalition.", "e": 1}, {"id": "t8", "cat": "C1", "term": "grassroots", "ipa": "/ˈɡrɑːsruːts/", "pron": "GRASS-roots", "fr": "base militante ; militants de terrain", "def": "Ordinary members or supporters of a political movement, rather than its leaders.", "ex": "Grassroots activists helped the campaign gain momentum.", "e": 0}, {"id": "t9", "cat": "C1", "term": "party membership", "ipa": "/ˈpɑːti ˈmembəʃɪp/", "pron": "PAR-tee MEM-buh-ship", "fr": "adhérents d’un parti", "def": "The group of people who officially belong to a political party.", "ex": "Party membership has declined in many Western democracies.", "e": 0}, {"id": "t10", "cat": "C1", "term": "party leader", "ipa": "/ˈpɑːti ˈliːdə/", "pron": "PAR-tee LEE-duh", "fr": "chef de parti ; dirigeant de parti", "def": "The person who leads a political party.", "ex": "The party leader promised to rebuild public trust.", "e": 0}, {"id": "t11", "cat": "C1", "term": "rank-and-file members", "ipa": "/ˌræŋk ən ˈfaɪl ˈmembəz/", "pron": "rank uhn FILE MEM-buhz", "fr": "militants de base ; membres ordinaires", "def": "Ordinary members of a party or organisation, not its leaders.", "ex": "Rank-and-file members criticised the leadership’s decision.", "e": 0}, {"id": "t12", "cat": "C1", "term": "party conference", "ipa": "/ˈpɑːti ˈkɒnfərəns/", "pron": "PAR-tee KON-fuh-ruhns", "fr": "congrès d’un parti", "def": "A large formal meeting where a political party discusses policies and strategy.", "ex": "The prime minister delivered a major speech at the party conference.", "e": 0}, {"id": "t13", "cat": "C1", "term": "manifesto", "ipa": "/ˌmænɪˈfestəʊ/", "pron": "man-i-FES-toh", "fr": "programme électoral ; manifeste", "def": "A public document in which a political party presents its ideas, promises and programme.", "ex": "The manifesto included pledges on taxation, housing and climate policy.", "e": 1}, {"id": "t14", "cat": "C1", "term": "party platform", "ipa": "/ˈpɑːti ˈplætfɔːm/", "pron": "PAR-tee PLAT-form", "fr": "programme politique ; plateforme d’un parti", "def": "The official set of policies and principles supported by a party.", "ex": "The party platform moved further to the right on immigration.", "e": 0}, {"id": "t15", "cat": "C1", "term": "policy", "ipa": "/ˈpɒləsi/", "pron": "POL-uh-see", "fr": "politique ; mesure ; ligne politique", "def": "A plan or course of action adopted by a government, party or institution.", "ex": "The party’s housing policy was popular among young voters.", "e": 0}, {"id": "t16", "cat": "C1", "term": "ideology", "ipa": "/ˌaɪdiˈɒlədʒi/", "pron": "eye-dee-OL-uh-jee", "fr": "idéologie", "def": "A set of political beliefs or principles about how society should be organised.", "ex": "Political ideology shapes how parties view the role of the state.", "e": 1}, {"id": "t17", "cat": "C2", "term": "left-wing", "ipa": "/ˌleft ˈwɪŋ/", "pron": "left wing", "fr": "de gauche", "def": "Supporting social equality, public services and a more active role for the state in the economy.", "ex": "Left-wing parties usually support stronger welfare policies.", "e": 1}, {"id": "t18", "cat": "C2", "term": "right-wing", "ipa": "/ˌraɪt ˈwɪŋ/", "pron": "right wing", "fr": "de droite", "def": "Supporting tradition, free markets, national identity or limited state intervention, depending on context.", "ex": "Right-wing parties often call for lower taxes and stricter law enforcement.", "e": 1}, {"id": "t19", "cat": "C2", "term": "centre-left", "ipa": "/ˌsentə ˈleft/", "pron": "SEN-tuh left", "fr": "centre gauche", "def": "Moderately left-wing; usually supportive of welfare and equality but within a market economy.", "ex": "The centre-left party promised to protect public services.", "e": 0}, {"id": "t20", "cat": "C2", "term": "centre-right", "ipa": "/ˌsentə ˈraɪt/", "pron": "SEN-tuh right", "fr": "centre droit", "def": "Moderately right-wing; usually supportive of free markets, fiscal discipline and gradual reform.", "ex": "The centre-right candidate appealed to business leaders.", "e": 0}, {"id": "t21", "cat": "C2", "term": "the political spectrum", "ipa": "/ðə pəˈlɪtɪkəl ˈspektrəm/", "pron": "thuh puh-LIT-i-kuhl SPEK-truhm", "fr": "échiquier politique ; spectre politique", "def": "The range of political positions from left to right, including moderate and extreme views.", "ex": "The issue divides voters across the political spectrum.", "e": 1}, {"id": "t22", "cat": "C2", "term": "moderate", "ipa": "/ˈmɒdərət/", "pron": "MOD-uh-ruht", "fr": "modéré", "def": "Having political views that are not extreme.", "ex": "Moderate voters may reject radical proposals.", "e": 0}, {"id": "t23", "cat": "C2", "term": "centrist", "ipa": "/ˈsentrɪst/", "pron": "SEN-trist", "fr": "centriste", "def": "A person or party with moderate political views between the left and the right.", "ex": "The centrist party tried to attract voters tired of polarisation.", "e": 0}, {"id": "t24", "cat": "C2", "term": "radical", "ipa": "/ˈrædɪkəl/", "pron": "RAD-i-kuhl", "fr": "radical", "def": "Supporting deep or fundamental political change.", "ex": "Radical movements often emerge during periods of crisis.", "e": 0}, {"id": "t25", "cat": "C2", "term": "extremist", "ipa": "/ɪkˈstriːmɪst/", "pron": "ik-STREEM-ist", "fr": "extrémiste", "def": "A person or group with political views far outside the mainstream, often rejecting democratic norms.", "ex": "Extremist groups exploited anger and economic insecurity.", "e": 0}, {"id": "t26", "cat": "C2", "term": "mainstream", "ipa": "/ˈmeɪnstriːm/", "pron": "MAYN-streem", "fr": "dominant ; traditionnel ; grand public", "def": "Considered normal, dominant or widely accepted in society or politics.", "ex": "The idea has moved from the margins into mainstream politics.", "e": 1}, {"id": "t27", "cat": "C2", "term": "fringe party", "ipa": "/ˈfrɪndʒ ˈpɑːti/", "pron": "frinj PAR-tee", "fr": "parti marginal", "def": "A small party with views outside the political mainstream.", "ex": "The fringe party gained attention through social media.", "e": 0}, {"id": "t28", "cat": "C2", "term": "populism", "ipa": "/ˈpɒpjəlɪzəm/", "pron": "POP-yuh-liz-uhm", "fr": "populisme", "def": "A political style that claims to defend ordinary people against corrupt elites.", "ex": "Populism often presents politics as a battle between the people and the elite.", "e": 1}, {"id": "t29", "cat": "C2", "term": "populist", "ipa": "/ˈpɒpjəlɪst/", "pron": "POP-yuh-list", "fr": "populiste", "def": "A politician, party or movement that uses populist language or ideas.", "ex": "The populist leader promised to speak for ordinary citizens.", "e": 0}, {"id": "t30", "cat": "C2", "term": "nationalism", "ipa": "/ˈnæʃənəlɪzəm/", "pron": "NASH-uh-nuh-liz-uhm", "fr": "nationalisme", "def": "A political belief that emphasises national identity, sovereignty and loyalty to the nation.", "ex": "Nationalism can unite people but can also fuel exclusion.", "e": 0}, {"id": "t31", "cat": "C2", "term": "patriotism", "ipa": "/ˈpætriətɪzəm/", "pron": "PAT-ree-uh-tiz-uhm", "fr": "patriotisme", "def": "Love of and loyalty to one’s country, usually without necessarily rejecting others.", "ex": "The speech appealed to patriotism rather than hostility to foreigners.", "e": 0}, {"id": "t32", "cat": "C2", "term": "conservatism", "ipa": "/kənˈsɜːvətɪzəm/", "pron": "kuhn-SUR-vuh-tiz-uhm", "fr": "conservatisme", "def": "A political ideology that values tradition, stability, gradual change and often limited government.", "ex": "Conservatism often stresses order, family and national continuity.", "e": 0}, {"id": "t33", "cat": "C2", "term": "liberalism", "ipa": "/ˈlɪbərəlɪzəm/", "pron": "LIB-uh-ruh-liz-uhm", "fr": "libéralisme", "def": "A political ideology that emphasises individual rights, freedoms, democracy and the rule of law.", "ex": "Liberalism places strong emphasis on civil liberties.", "e": 0}, {"id": "t34", "cat": "C2", "term": "socialism", "ipa": "/ˈsəʊʃəlɪzəm/", "pron": "SOH-shuh-liz-uhm", "fr": "socialisme", "def": "A political ideology that supports greater economic equality and public or collective control of key resources.", "ex": "Socialism has historically called for stronger workers’ rights.", "e": 0}, {"id": "t35", "cat": "C3", "term": "social democracy", "ipa": "/ˌsəʊʃəl dɪˈmɒkrəsi/", "pron": "SOH-shuhl di-MOK-ruh-see", "fr": "social-démocratie", "def": "A moderate left-wing ideology that supports democracy, welfare policies and a regulated market economy.", "ex": "Social democracy seeks to combine capitalism with social protection.", "e": 0}, {"id": "t36", "cat": "C3", "term": "libertarianism", "ipa": "/ˌlɪbəˈteəriənɪzəm/", "pron": "lib-uh-TAIR-ee-uh-niz-uhm", "fr": "libertarianisme", "def": "A political ideology that emphasises individual freedom, limited government and free markets.", "ex": "Libertarianism is sceptical of state intervention.", "e": 0}, {"id": "t37", "cat": "C3", "term": "neoliberalism", "ipa": "/ˌniːəʊˈlɪbərəlɪzəm/", "pron": "nee-oh-LIB-uh-ruh-liz-uhm", "fr": "néolibéralisme", "def": "An ideology favouring free markets, deregulation, privatisation and a reduced role for the state in the economy.", "ex": "Critics blame neoliberalism for rising inequality.", "e": 0}, {"id": "t38", "cat": "C3", "term": "environmentalism", "ipa": "/ɪnˌvaɪrənˈmentəlɪzəm/", "pron": "in-vy-ruhn-MEN-tuh-liz-uhm", "fr": "écologisme ; environnementalisme", "def": "A political and social movement that seeks to protect the environment.", "ex": "Environmentalism has become a major force in European politics.", "e": 0}, {"id": "t39", "cat": "C3", "term": "green politics", "ipa": "/ˌɡriːn ˈpɒlɪtɪks/", "pron": "green POL-i-tiks", "fr": "politique écologiste", "def": "Political ideas focused on environmental protection, sustainability and climate action.", "ex": "Green politics has pushed climate change higher on the political agenda.", "e": 0}, {"id": "t40", "cat": "C3", "term": "feminism", "ipa": "/ˈfemɪnɪzəm/", "pron": "FEM-i-niz-uhm", "fr": "féminisme", "def": "A movement and ideology supporting equal rights and opportunities for women and men.", "ex": "Feminism has reshaped debates on work, family and political representation.", "e": 0}, {"id": "t41", "cat": "C3", "term": "identity politics", "ipa": "/aɪˈdentəti ˈpɒlɪtɪks/", "pron": "eye-DEN-tuh-tee POL-i-tiks", "fr": "politique identitaire", "def": "Political positions based on the interests or experiences of particular identity groups.", "ex": "Critics and supporters disagree sharply over the role of identity politics.", "e": 0}, {"id": "t42", "cat": "C3", "term": "culture wars", "ipa": "/ˈkʌltʃə wɔːz/", "pron": "KUL-chuh wawz", "fr": "guerres culturelles", "def": "Political conflicts over values, identity, education, religion, gender or national history.", "ex": "Culture wars have become a central feature of American politics.", "e": 0}, {"id": "t43", "cat": "C3", "term": "progressive", "ipa": "/prəˈɡresɪv/", "pron": "pruh-GRES-iv", "fr": "progressiste", "def": "Supporting social reform, equality and change, especially on social issues.", "ex": "Progressive voters demanded stronger action on climate change.", "e": 0}, {"id": "t44", "cat": "C3", "term": "reactionary", "ipa": "/riˈækʃənəri/", "pron": "ree-AK-shuh-nuh-ree", "fr": "réactionnaire", "def": "Opposed to social or political change and wishing to return to a previous order.", "ex": "The policy was criticised as reactionary by civil rights groups.", "e": 0}, {"id": "t45", "cat": "C3", "term": "hardline", "ipa": "/ˈhɑːdlaɪn/", "pron": "HARD-line", "fr": "intransigeant ; dur", "def": "Taking a strict, uncompromising political position.", "ex": "The government adopted a hardline stance on immigration.", "e": 0}, {"id": "t46", "cat": "C3", "term": "hawkish", "ipa": "/ˈhɔːkɪʃ/", "pron": "HAW-kish", "fr": "belliciste ; partisan d’une ligne dure", "def": "Supporting strong military action or a tough foreign policy.", "ex": "Hawkish lawmakers called for tougher sanctions.", "e": 0}, {"id": "t47", "cat": "C4", "term": "dovish", "ipa": "/ˈdʌvɪʃ/", "pron": "DUV-ish", "fr": "pacifique ; partisan de la conciliation", "def": "Supporting diplomacy, compromise or a softer foreign policy.", "ex": "Dovish politicians warned against military escalation.", "e": 0}, {"id": "t48", "cat": "C4", "term": "pragmatic", "ipa": "/præɡˈmætɪk/", "pron": "prag-MAT-ik", "fr": "pragmatique", "def": "Focused on practical results rather than ideology.", "ex": "The mayor took a pragmatic approach to the housing crisis.", "e": 0}, {"id": "t49", "cat": "C4", "term": "polarisation", "ipa": "/ˌpəʊləraɪˈzeɪʃən/", "pron": "poh-luh-ry-ZAY-shuhn", "fr": "polarisation", "def": "The process by which political opinions become more divided and extreme.", "ex": "Political polarisation has made compromise more difficult.", "e": 1}, {"id": "t50", "cat": "C4", "term": "partisanship", "ipa": "/ˈpɑːtizənʃɪp/", "pron": "PAR-ti-zuhn-ship", "fr": "esprit partisan ; partisanerie", "def": "Strong loyalty to a political party, sometimes at the expense of fairness or compromise.", "ex": "Extreme partisanship can weaken trust in institutions.", "e": 0}, {"id": "t51", "cat": "C4", "term": "tribalism", "ipa": "/ˈtraɪbəlɪzəm/", "pron": "TRY-buh-liz-uhm", "fr": "tribalisme politique", "def": "A strong loyalty to one’s political group, often leading to hostility towards opponents.", "ex": "Social media can intensify political tribalism.", "e": 0}, {"id": "t52", "cat": "C4", "term": "bipartisanship", "ipa": "/ˌbaɪˈpɑːtizənʃɪp/", "pron": "bye-PAR-ti-zuhn-ship", "fr": "coopération bipartisane", "def": "Cooperation between two major political parties.", "ex": "The reform passed thanks to rare bipartisanship.", "e": 0}, {"id": "t53", "cat": "C4", "term": "cross-party support", "ipa": "/ˌkrɒs ˈpɑːti səˈpɔːt/", "pron": "kross PAR-tee suh-PORT", "fr": "soutien transpartisan", "def": "Support from members of different political parties.", "ex": "The bill received cross-party support.", "e": 0}, {"id": "t54", "cat": "C4", "term": "party discipline", "ipa": "/ˈpɑːti ˈdɪsəplɪn/", "pron": "PAR-tee DIS-uh-plin", "fr": "discipline de parti", "def": "The pressure on elected representatives to vote according to their party’s position.", "ex": "Party discipline prevented many MPs from rebelling.", "e": 0}, {"id": "t55", "cat": "C4", "term": "party line", "ipa": "/ˈpɑːti laɪn/", "pron": "PAR-tee line", "fr": "ligne du parti", "def": "The official position of a political party on an issue.", "ex": "Several lawmakers refused to follow the party line.", "e": 1}, {"id": "t56", "cat": "C4", "term": "backbencher", "ipa": "/ˌbækˈbentʃə/", "pron": "bak-BEN-chuh", "fr": "député de base ; parlementaire sans fonction ministérielle", "def": "An ordinary MP who is not a minister or party leader, especially in the UK.", "ex": "Backbenchers put pressure on the prime minister to change course.", "e": 0}, {"id": "t57", "cat": "C4", "term": "whip", "ipa": "/wɪp/", "pron": "wip", "fr": "whip ; responsable de discipline parlementaire", "def": "A party official responsible for ensuring that elected representatives vote according to the party line.", "ex": "The party whip urged MPs to support the bill.", "e": 0}, {"id": "t58", "cat": "C4", "term": "rebel MP", "ipa": "/ˈrebəl ˌem ˈpiː/", "pron": "REB-uhl em pee", "fr": "député dissident", "def": "A Member of Parliament who votes against their own party’s position.", "ex": "Several rebel MPs opposed the government’s plan.", "e": 0}, {"id": "t59", "cat": "C5", "term": "defection", "ipa": "/dɪˈfekʃən/", "pron": "di-FEK-shuhn", "fr": "défection ; changement de camp", "def": "The act of leaving one political party to join another or become independent.", "ex": "The defection embarrassed the party leadership.", "e": 0}, {"id": "t60", "cat": "C5", "term": "faction", "ipa": "/ˈfækʃən/", "pron": "FAK-shuhn", "fr": "faction ; courant interne", "def": "A smaller group within a party that has its own views or interests.", "ex": "The party is divided between moderate and radical factions.", "e": 0}, {"id": "t61", "cat": "C5", "term": "split", "ipa": "/splɪt/", "pron": "split", "fr": "scission ; division", "def": "A serious division within a party, movement or group.", "ex": "The leadership contest exposed a deep split within the party.", "e": 0}, {"id": "t62", "cat": "C5", "term": "realignment", "ipa": "/ˌriːəˈlaɪnmənt/", "pron": "ree-uh-LYNE-muhnt", "fr": "recomposition politique ; réalignement", "def": "A major and lasting change in the support base of parties or political groups.", "ex": "The election signalled a realignment of working-class voters.", "e": 0}, {"id": "t63", "cat": "C5", "term": "to shift to the right", "ipa": "/ʃɪft tə ðə ˈraɪt/", "pron": "shift tuh thuh right", "fr": "se déplacer vers la droite", "def": "To adopt more right-wing positions.", "ex": "The party shifted to the right on immigration.", "e": 1}, {"id": "t64", "cat": "C5", "term": "to move to the centre", "ipa": "/muːv tə ðə ˈsentə/", "pron": "moov tuh thuh SEN-tuh", "fr": "se recentrer", "def": "To adopt more moderate positions.", "ex": "After losing the election, the party tried to move to the centre.", "e": 0}, {"id": "t65", "cat": "C5", "term": "to appeal to voters", "ipa": "/əˈpiːl tə ˈvəʊtəz/", "pron": "uh-PEEL tuh VOH-tuhz", "fr": "séduire les électeurs ; parler aux électeurs", "def": "To attract or persuade voters.", "ex": "The party tried to appeal to younger voters.", "e": 0}, {"id": "t66", "cat": "C5", "term": "to alienate voters", "ipa": "/ˈeɪliəneɪt ˈvəʊtəz/", "pron": "AY-lee-uh-nayt VOH-tuhz", "fr": "aliéner ; se mettre à dos les électeurs", "def": "To make voters feel rejected, ignored or hostile.", "ex": "The policy alienated many moderate voters.", "e": 0}, {"id": "t67", "cat": "C5", "term": "to broaden one’s appeal", "ipa": "/ˈbrɔːdən wʌnz əˈpiːl/", "pron": "BRAW-duhn wunz uh-PEEL", "fr": "élargir son électorat ; élargir son audience", "def": "To become attractive to a wider range of voters.", "ex": "The candidate tried to broaden her appeal beyond the party base.", "e": 0}], "domain": "politics", "context": {"choose": [{"q": "The new leader tried to ______ the party's appeal to younger, urban voters.", "opts": ["broaden", "broad", "broadcast"], "a": 0, "why": "The fixed collocation is <b>to broaden one's appeal</b>. “Broad” is an adjective; “broadcast” means to transmit."}, {"q": "After losing the centre ground, the party began to ______ to the right.", "opts": ["shift", "shifting", "shifted"], "a": 0, "why": "After “to”, use the base form: <b>to shift to the right</b>."}, {"q": "Hardline rhetoric risks ______ the moderate voters the party needs.", "opts": ["alienating", "appealing", "broadening"], "a": 0, "why": "<b>To alienate voters</b> = to drive them away."}], "colloc": [{"q": "Which phrase sounds natural?", "opts": ["the party row", "the party line", "the party string"], "a": 1, "why": "<b>The party line</b> is the official position members are expected to support."}, {"q": "Which phrase is correct?", "opts": ["the politics spectrum", "the political spectre", "the political spectrum"], "a": 2, "why": "<b>The political spectrum</b>. “Spectre” means a ghost — a false-friend trap."}, {"q": "Which is the standard term for the party in power?", "opts": ["the ruling party", "the reigning party", "the commanding party"], "a": 0, "why": "<b>The ruling party</b> (or the governing party)."}], "nuance": [{"q": "What is the difference between <b>radical</b> and <b>extremist</b>?", "a": "Both want deep change, but <b>radical</b> means favouring far-reaching reform (it can be neutral or positive), while <b>extremist</b> implies going beyond acceptable, often anti-democratic, limits."}, {"q": "What is the difference between <b>moderate</b> and <b>centrist</b>?", "a": "A <b>centrist</b> sits in the middle of the spectrum by position. A <b>moderate</b> is defined by tone — pragmatic, hostile to extremes — and can exist inside a left- or right-wing party."}, {"q": "What is the difference between <b>nationalism</b> and <b>patriotism</b>?", "a": "<b>Patriotism</b> is love of one's country; <b>nationalism</b> asserts the nation's interests or superiority, often against others, and is more politically loaded."}]}, "detective": [{"head": "Ruling party shifts to the right to fend off a populist surge", "words": ["ruling party", "to shift to the right", "populist", "mainstream"], "issue": "This is about <b>mainstream parties under pressure</b>: established parties copying populist themes to win back voters. Links to polarisation and realignment."}, {"head": "Backbench rebels defy the party line over flagship bill", "words": ["backbencher", "rebel MP", "party line", "party discipline"], "issue": "This is about the limits of <b>party discipline</b>: loyalty to the party (the whips) vs an MP's own conscience or constituents."}, {"head": "Centre-left struggles as politics fragments into rival factions", "words": ["centre-left", "faction", "split", "realignment", "polarisation"], "issue": "This is abou const PALETTES={politics:["#1f3a5f","#2f6f9f","#b23a2e","#c89b3c"],environment:["#1f5f4a","#2f9f6f","#b07d1a","#3f7a4b"],economy:["#1f3a5f","#2f6f9f","#106a5a","#c89b3c"],society:["#5b3a7a","#7a5aa0","#c8702f","#c89b3c"],technology:["#143b6b","#2f6f9f","#5f6c7b","#c89b3c"],health:["#005EB8","#2f8fcf","#3f7a4b","#c89b3c"],general:["#33473F","#4f6a5e","#9C6B22","#c89b3c"]};
(function(){const c=PALETTES[CHAPTER.domain]||PALETTES.general;const r=document.documentElement.style;r.setProperty('--p',c[0]);r.setProperty('--p2',c[1]);r.setProperty('--acc',c[2]);r.setProperty('--gold',c[3]);})();
const KEY="cpgevocab_"+CHAPTER.id;
let mem={modes:{},words:{}};
function load(){try{const r=localStorage.getItem(KEY);if(r)mem=JSON.parse(r);}catch(e){}if(!mem.modes)mem.modes={};if(!mem.words)mem.words={};}
function save(){try{localStorage.setItem(KEY,JSON.stringify(mem));}catch(e){}}
function wstate(id){return mem.words[id]||(mem.words[id]={});}
function has(x){return Array.isArray(x)?x.length>0:!!x;}
function available(k){
  if(["discover","explorer","pron","library"].includes(k))return true;
  const c=CHAPTER;
  if(k==="context")return c.context&&(has(c.context.choose)||has(c.context.colloc)||has(c.context.nuance));
  if(k==="detective")return has(c.detective);
  if(k==="connections")return has(c.connections);
  if(k==="networks")return has(c.networks);
  if(k==="wordlab")return has(c.wordlab);
  if(k==="kholle")return c.kholle&&has(c.kholle.problematics);
  if(k==="survival")return c.survival&&has(c.survival.words);
  return false;
}
const ALL=[["discover","Discover"],["explorer","Explorer"],["pron","Pronunciation"],["context","Context"],["detective","Detective"],["connections","Connections"],["networks","Networks"],["wordlab","Word Lab"],["kholle","Khôlle"],["survival","Survival Kit"],["library","Library"]];
const MODES=ALL.filter(([k])=>available(k));
let active=MODES[0][0];
function buildTabs(){const host=document.getElementById('tabs');host.innerHTML="";MODES.forEach(([k,l])=>{const b=document.createElement('button');b.className="tab";b.id="tab-"+k;b.innerHTML=`<span class="dot"></span>${l}`;b.onclick=()=>setMode(k);host.appendChild(b);});}
function statusClass(s){return s==="done"?"s-done":s==="rev"?"s-rev":s==="prog"?"s-prog":"";}
function refreshTabs(){MODES.forEach(([k])=>{const t=document.getElementById('tab-'+k);t.classList.remove('s-done','s-rev','s-prog','on');const s=mem.modes[k];if(s)t.classList.add(statusClass(s));if(k===active)t.classList.add('on');});}
function setMode(k){active=k;document.querySelectorAll('.panel').forEach(p=>p.classList.remove('on'));document.getElementById('p-'+k).classList.add('on');if(!mem.modes[k])mem.modes[k]="prog";save();refreshTabs();updateProgress();window.scrollTo({top:0,behavior:'smooth'});}
function markMode(k,s){mem.modes[k]=s;save();refreshTabs();updateProgress();renderStatus(k);}
function updateProgress(){const done=MODES.filter(([k])=>mem.modes[k]==="done").length;const pct=Math.round(done/MODES.length*100);document.getElementById('cpBar').style.width=pct+"%";document.getElementById('cpPct').textContent=pct+"%";}
function statusFooter(k){const s=mem.modes[k]||"none";const label={none:"Not started",prog:"In progress",done:"Completed",rev:"To review"}[s];return `<div class="statusbar"><span class="lbl">This mode:</span><span class="cur s-${s}" id="cur-${k}">${label}</span><button class="done" onclick="markMode('${k}','done')">Mark completed</button><button class="rev" onclick="markMode('${k}','rev')">To review</button></div>`;}
function renderStatus(k){const s=mem.modes[k]||"none";const el=document.getElementById('cur-'+k);if(el){el.textContent={none:"Not started",prog:"In progress",done:"Completed",rev:"To review"}[s];el.className="cur s-"+s;}}
function rev(el){el.classList.toggle('open');}
function speak(t){try{if('speechSynthesis'in window){const u=new SpeechSynthesisUtterance(t);u.lang='en-GB';u.rate=.9;speechSynthesis.cancel();speechSynthesis.speak(u);}}catch(e){}}
function renderHeader(){document.getElementById('chEyebrow').textContent=("CPGE English Vocabulary · "+(CHAPTER.part||"")).trim();document.getElementById('chTitle').textContent=`Chapter ${CHAPTER.number} — ${CHAPTER.title}`;document.getElementById('chObj').textContent=CHAPTER.objective||"";document.getElementById('chTags').innerHTML=(CHAPTER.tags||[]).map(t=>`<span class="tag">${t}</span>`).join("");document.getElementById('footNote').innerHTML=`<b>Reusable workshop.</b> One template, one <code>CHAPTER</code> data object. Progress is saved on this device (with a safe fallback to memory). Audio uses the browser's built-in speech synthesis — no external files.`;}

function renderDiscover(){let ess=CHAPTER.terms.filter(t=>t.e);if(!ess.length)ess=CHAPTER.terms.slice(0,Math.min(12,CHAPTER.terms.length));
  const cards=ess.map(t=>{const w=wstate(t.id);return `<article class="card vc"><div class="top"><div><div class="term">${t.term}</div><div class="fr">${t.fr}</div></div></div><div class="ex">${t.ex}</div><div class="reveal" onclick="rev(this)"><button type="button">Show definition <span class="chev">▾</span></button><div class="body"><div><p style="padding-top:12px">${t.def}</p></div></div></div><div class="rate"><button class="know ${w.know?'on':''}" onclick="rateDiscover('${t.id}','know',this)">I know this</button><button class="rev ${w.review?'on':''}" onclick="rateDiscover('${t.id}','review',this)">Review later</button></div></article>`;}).join("");
  document.getElementById('p-discover').innerHTML=`<div class="mode-h"><div class="k">Discover</div><h2>Discover the essentials</h2><p class="sub">The ${ess.length} words you cannot do without. Read the example, test yourself, then reveal the definition.</p></div><div class="grid">${cards}</div>${statusFooter('discover')}`;}
function rateDiscover(id,which,btn){const w=wstate(id);if(which==='know'){w.know=!w.know;if(w.know)w.review=false;}else{w.review=!w.review;if(w.review)w.know=false;}save();const c=btn.closest('.vc');c.querySelector('.know').classList.toggle('on',!!w.know);c.querySelector('.rev').classList.toggle('on',!!w.review);}

let exState={cat:"all",q:"",fr:true,ipa:true,ex:true};
function renderExplorer(){const catChips=`<button class="chip on" data-cat="all" onclick="exCat('all')">All (${CHAPTER.terms.length})</button>`+CHAPTER.categories.map(c=>`<button class="chip" data-cat="${c.id}" onclick="exCat('${c.id}')">${c.title.replace(/^[A-Z]\. /,'')}</button>`).join("");
  document.getElementById('p-explorer').innerHTML=`<div class="mode-h"><div class="k">Explorer</div><h2>Vocabulary explorer</h2><p class="sub">All ${CHAPTER.terms.length} terms. Filter, search, and choose what to show. Tap a card to expand it.</p></div><div class="controls"><label class="search"><span>🔎</span><input id="exSearch" type="search" placeholder="Search a term, French word or definition…" oninput="exSearch(this.value)"></label><button class="toggle on" id="tg-fr" onclick="exTog('fr',this)">French</button><button class="toggle on" id="tg-ipa" onclick="exTog('ipa',this)">IPA</button><button class="toggle on" id="tg-ex" onclick="exTog('ex',this)">Examples</button></div><div class="chips">${catChips}</div><div class="grid" id="exGrid"></div>${statusFooter('explorer')}`;exRender();}
function exCat(c){exState.cat=c;document.querySelectorAll('#p-explorer .chip').forEach(x=>x.classList.toggle('on',x.dataset.cat===c));exRender();}
function exSearch(v){exState.q=v.toLowerCase().trim();exRender();}
function exTog(k,b){exState[k]=!exState[k];b.classList.toggle('on',exState[k]);exRender();}
function exRender(){const g=document.getElementById('exGrid');g.className="grid"+(exState.fr?"":" hideFr")+(exState.ipa?"":" hideIpa")+(exState.ex?"":" hideEx");
  const list=CHAPTER.terms.filter(t=>{if(exState.cat!=="all"&&t.cat!==exState.cat)return false;if(exState.q){return (t.term+" "+t.fr+" "+t.def).toLowerCase().includes(exState.q);}return true;});
  g.innerHTML=list.map(t=>`<article class="card vc"><button class="top" style="width:100%;text-align:left;background:none;border:none;padding:0" onclick="this.closest('.vc').classList.toggle('open')"><div><div class="term">${t.term}</div><div class="fr">${t.fr}</div></div><div class="exp">＋</div></button><div class="body"><div><div class="meta"><div class="ipa-row"><span class="lab">IPA:</span> ${t.ipa} &nbsp; <span style="color:var(--muted)">${t.pron}</span></div></div><p class="def"><b style="color:var(--p)">Definition:</b> ${t.def}</p><div class="ex">${t.ex}</div></div></div></article>`).join("")||`<p style="color:var(--muted);grid-column:1/-1">No term matches “${exState.q}”.</p>`;}

let pronDiffOnly=false;
function renderPron(){document.getElementById('p-pron').innerHTML=`<div class="mode-h"><div class="k">Pronunciation</div><h2>Pronunciation trainer</h2><p class="sub">IPA, a simplified guide, and a built-in voice. Flag the hard words, then drill only those.</p></div><div class="controls"><button class="toggle" id="tg-diff" onclick="pronTog(this)">Show only difficult words</button></div><div class="card" id="pronList" style="margin-top:14px;padding:4px"></div>${statusFooter('pron')}`;pronRender();}
function pronTog(b){pronDiffOnly=!pronDiffOnly;b.classList.toggle('on',pronDiffOnly);pronRender();}
function pronRender(){const list=CHAPTER.terms.filter(t=>!pronDiffOnly||wstate(t.id).diff);document.getElementById('pronList').innerHTML=list.map(t=>{const w=wstate(t.id);return `<div class="pron-row"><button class="spk" title="Hear it" onclick="speak('${t.term.replace(/'/g,"\\'")}')">🔊</button><div class="t"><div class="term">${t.term}</div><div class="ph">${t.ipa} · ${t.pron}</div></div><button class="mark got ${w.got?'on':''}" onclick="pronMark('${t.id}','got',this)">Got it</button><button class="mark diff ${w.diff?'on':''}" onclick="pronMark('${t.id}','diff',this)">Difficult</button></div>`;}).join("")||`<p style="color:var(--muted);padding:14px">No difficult words flagged. Toggle the filter off.</p>`;}
function pronMark(id,which){const w=wstate(id);if(which==='got'){w.got=!w.got;if(w.got)w.diff=false;}else{w.diff=!w.diff;if(w.diff)w.got=false;}save();pronRender();}

function renderContext(){const c=CHAPTER.context;const mcq=(items,act)=>(items||[]).map((it,i)=>`<div class="act card"><div class="q">${it.q}</div>${it.opts.map((o,j)=>`<button class="opt" onclick="ctxAns('${act}',${i},${j},this)">${o}<span class="tag"></span></button>`).join("")}<div class="reveal" onclick="rev(this)" style="margin-top:6px"><button type="button">Why? <span class="chev">▾</span></button><div class="body"><div><p style="padding-top:10px">${it.why}</p></div></div></div></div>`).join("");
  const nuance=(c.nuance||[]).map(n=>`<div class="act card"><div class="q">${n.q}</div><div class="reveal" onclick="rev(this)"><button type="button">Reveal the nuance <span class="chev">▾</span></button><div class="body"><div><p style="padding-top:10px">${n.a}</p></div></div></div></div>`).join("");
  let h=`<div class="mode-h"><div class="k">Context</div><h2>Vocabulary in context</h2><p class="sub">Use the words for real: choose the right one, spot the natural collocation, explain the nuance.</p></div>`;
  if(has(c.choose))h+=`<h3 style="margin-top:18px;color:var(--p)">A · Choose the right word</h3>${mcq(c.choose,'choose')}`;
  if(has(c.colloc))h+=`<h3 style="margin-top:18px;color:var(--p)">B · Spot the collocation</h3>${mcq(c.colloc,'colloc')}`;
  if(has(c.nuance))h+=`<h3 style="margin-top:18px;color:var(--p)">C · Explain the nuance</h3>${nuance}`;
  document.getElementById('p-context').innerHTML=h+statusFooter('context');}
function ctxAns(act,i,j,btn){const it=CHAPTER.context[act][i];const w=btn.parentNode;[...w.querySelectorAll('.opt')].forEach((o,k)=>{o.style.pointerEvents="none";if(k===it.a){o.classList.add('correct');o.querySelector('.tag').textContent="✓";}else if(k===j){o.classList.add('wrong');o.querySelector('.tag').textContent="✗";}});}

function renderDetective(){const d=(CHAPTER.detective||[]).map(h=>`<div class="act card"><div class="q">“${h.head}”</div><div class="reveal" onclick="rev(this)"><button type="button">Which chapter words can you spot? <span class="chev">▾</span></button><div class="body"><div><div class="sk words" style="padding-top:10px">${h.words.map(w=>`<span>${w}</span>`).join("")}</div></div></div></div><div class="reveal" onclick="rev(this)" style="margin-top:8px"><button type="button">What broader issue does this connect to? <span class="chev">▾</span></button><div class="body"><div><p style="padding-top:10px">${h.issue}</p></div></div></div></div>`).join("");
  document.getElementById('p-detective').innerHTML=`<div class="mode-h"><div class="k">Detective</div><h2>Article detective</h2><p class="sub">Read a headline as an examiner would: which chapter words appear, and what debate sits behind them?</p></div>${d}${statusFooter('detective')}`;}

function renderConnections(){const c=(CHAPTER.connections||[]).map(x=>`<div class="card conn"><div class="ct">${CHAPTER.title} ↔ ${x.to}</div><div class="reveal" onclick="rev(this)" style="margin-top:10px"><button type="button">See the link <span class="chev">▾</span></button><div class="body"><div><p style="padding-top:10px">${x.why}</p><div class="sk words" style="margin-top:10px">${x.words.map(w=>`<span>${w}</span>`).join("")}</div><p style="margin-top:10px"><b style="color:var(--p)">Possible khôlle question:</b> ${x.q}</p></div></div></div></div>`).join("");
  document.getElementById('p-connections').innerHTML=`<div class="mode-h"><div class="k">Connections</div><h2>Connections</h2><p class="sub">Vocabulary matters when it links to the big debates. Tap each bridge: how it connects, three words to reuse, a question to try.</p></div>${c}${statusFooter('connections')}`;}

function renderNetworks(){const n=(CHAPTER.networks||[]).map(x=>`<div class="card net"><div class="w">${x.w}</div><div class="fam">${x.family.map(f=>`<span>${f}</span>`).join("")}</div>${x.syn?`<div class="row"><b>Synonyms:</b> ${x.syn}</div>`:""}${x.opp?`<div class="row"><b>Opposites:</b> ${x.opp}</div>`:""}${x.coll?`<div class="row"><b>Collocations:</b> ${x.coll}</div>`:""}${x.debate?`<div class="row"><b>Related debate:</b> ${x.debate}</div>`:""}${x.ff?`<div class="ff"><b>False friend —</b> ${x.ff}</div>`:""}</div>`).join("");
  document.getElementById('p-networks').innerHTML=`<div class="mode-h"><div class="k">Networks</div><h2>Vocabulary networks</h2><p class="sub">Learn words in families: derivatives, synonyms, opposites, the debates they belong to — and the false friends.</p></div>${n}${statusFooter('networks')}`;}

function renderWordlab(){const w=(CHAPTER.wordlab||[]).map(x=>`<div class="card wd"><div class="w">${x.w}</div><div class="reveal" onclick="rev(this)" style="margin-top:8px"><button type="button">Break it down <span class="chev">▾</span></button><div class="body"><div><div class="break">${x.parts}</div><p style="margin-top:10px">${x.meaning}</p></div></div></div></div>`).join("");
  document.getElementById('p-wordlab').innerHTML=`<div class="mode-h"><div class="k">Word Lab</div><h2>Word lab</h2><p class="sub">Decode meaning from morphology — prefixes, roots, suffixes. Guess first, then break it down.</p></div>${w}${statusFooter('wordlab')}`;}

let kb={words:new Set()};
function renderKholle(){const k=CHAPTER.kholle;document.getElementById('p-kholle').innerHTML=`<div class="mode-h"><div class="k">Khôlle</div><h2>Khôlle builder</h2><p class="sub">Topic — <b>${k.topic}</b>. Build a spoken answer step by step, reusing the chapter's words. (No “to what extent”.)</p></div>
   <div class="step"><div class="sl">Step 1</div><h3>Choose a hook</h3><div class="pickrow">${k.hooks.map((h,i)=>`<button class="pick" onclick="kbPick(this)">${h}</button>`).join("")}</div></div>
   <div class="step"><div class="sl">Step 2</div><h3>Choose a tension</h3><div class="pickrow">${k.tensions.map(h=>`<button class="pick" onclick="kbPick(this)">${h}</button>`).join("")}</div></div>
   <div class="step"><div class="sl">Step 3</div><h3>Pick a problematic</h3><div class="pickrow">${k.problematics.map(h=>`<button class="pick" onclick="kbPick(this)">${h}</button>`).join("")}</div></div>
   <div class="step"><div class="sl">Step 4</div><h3>Choose 3 useful words</h3><div class="pickrow">${k.words.map((w,i)=>`<button class="pick" onclick="kbWord(${i},this)">${w}</button>`).join("")}</div></div>
   <div class="step"><div class="sl">Step 5</div><h3>Draft your plan</h3><textarea placeholder="I. …&#10;II. …&#10;III. …"></textarea></div>
   <div class="step"><div class="sl">Step 6</div><h3>Reveal model ideas</h3><div class="reveal" onclick="rev(this)"><button type="button">Show a model plan &amp; ideas <span class="chev">▾</span></button><div class="body"><div><ol class="plan" style="margin-top:8px">${k.modelPlan.map(p=>`<li>${p}</li>`).join("")}</ol><p style="margin-top:12px">${k.modelIdeas}</p></div></div></div></div>${statusFooter('kholle')}`;}
function kbPick(btn){[...btn.parentNode.children].forEach(c=>c.classList.toggle('on',c===btn));}
function kbWord(i,btn){if(kb.words.has(i)){kb.words.delete(i);btn.classList.remove('on');}else{if(kb.words.size>=3)return;kb.words.add(i);btn.classList.add('on');}}

function renderSurvival(){const s=CHAPTER.survival;document.getElementById('p-survival').innerHTML=`<div class="mode-h"><div class="k">Survival Kit</div><h2>Survival kit</h2><p class="sub">If you only learn 20 things. The night-before rescue sheet.</p></div><div class="card sk"><h3>20 essential words</h3><div class="words">${s.words.map(w=>`<span>${w}</span>`).join("")}</div></div><div class="card sk"><h3>10 collocations</h3><div class="words">${(s.collocations||[]).map(w=>`<span>${w}</span>`).join("")}</div></div><div class="card sk"><h3>5 ready-to-use sentences</h3><ul>${(s.phrases||[]).map(p=>`<li>${p}</li>`).join("")}</ul></div><div class="card sk"><h3>5 khôlle questions</h3><ul>${(s.questions||[]).map(p=>`<li>${p}</li>`).join("")}</ul></div><div class="card sk"><h3>3 ready openings</h3><ul>${(s.openings||[]).map(p=>`<li>${p}</li>`).join("")}</ul></div>${statusFooter('survival')}`;}

function renderLibrary(){const secs=CHAPTER.categories.map(c=>{const cards=CHAPTER.terms.filter(t=>t.cat===c.id).map(t=>`<article class="card vc open"><div class="top"><div><div class="term">${t.term}</div><div class="fr">${t.fr}</div></div></div><div class="body"><div><div class="meta"><div><span class="lab">IPA:</span> ${t.ipa}</div><div><span class="lab">Pronunciation:</span> ${t.pron}</div></div><p class="def"><b style="color:var(--p)">Definition:</b> ${t.def}</p><div class="ex">${t.ex}</div></div></div></article>`).join("");return `<div class="lib-sec"><h3>${c.title}</h3><div class="grid">${cards}</div></div>`;}).join("");
  document.getElementById('p-library').innerHTML=`<div class="mode-h"><div class="k">Library</div><h2>Full chapter library</h2><p class="sub">The complete reference — every term and field, nothing lost. Grouped as in the original chapter.</p></div>${secs}${statusFooter('library')}`;}

function resetProgress(){if(confirm("Reset your progress for this chapter?")){mem={modes:{},words:{}};save();location.reload();}}

load();renderHeader();buildTabs();
const R={discover:renderDiscover,explorer:renderExplorer,pron:renderPron,context:renderContext,detective:renderDetective,connections:renderConnections,networks:renderNetworks,wordlab:renderWordlab,kholle:renderKholle,survival:renderSurvival,library:renderLibrary};
MODES.forEach(([k])=>{try{R[k]();}catch(e){console.error(k,e);}});
refreshTabs();updateProgress();setMode(active);
</script>
